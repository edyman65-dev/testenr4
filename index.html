<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduGalp</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500;9..40,600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#F8F6F2}
#cv{position:fixed;inset:0;z-index:0}

/* grain + vignette */
#grain{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.018;mix-blend-mode:multiply;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
#vig{position:fixed;inset:0;z-index:3;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,transparent 55%,rgba(200,180,150,.12) 100%)}

#ui{position:fixed;inset:0;z-index:30;pointer-events:none;font-family:'DM Sans',sans-serif}
#fade{position:fixed;inset:0;z-index:20;pointer-events:none;background:#F8F6F2;opacity:0;transition:opacity .65s ease}

/* ── TOPBAR ── */
#topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:24px 52px;background:linear-gradient(180deg,rgba(248,246,242,.95) 0%,transparent 100%)}
#gl{display:flex;align-items:center;gap:10px}
#gl svg{width:30px;height:30px;filter:drop-shadow(0 2px 6px rgba(255,107,0,.3))}
#gw{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:rgba(30,20,10,.82)}
#nl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(80,50,20,.35)}

#panel{position:absolute;bottom:0;left:0;right:0;padding:0 52px 80px;background:linear-gradient(0deg,rgba(248,246,242,.97) 0%,rgba(248,246,242,.82) 55%,transparent 100%);transition:opacity .5s}
#panel.off{opacity:0;pointer-events:none}

#ey{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:#FF6B00;font-weight:500;margin-bottom:12px;opacity:0;transition:opacity .5s .08s}
#ey.in{opacity:.85}
#ti{font-family:'Bebas Neue',sans-serif;font-size:clamp(62px,7.5vw,108px);color:#111;line-height:.9;letter-spacing:.5px;margin-bottom:16px;max-width:700px;opacity:0;transform:translateY(16px);transition:opacity .55s .12s,transform .55s .12s}
#ti.in{opacity:1;transform:translateY(0)}
#su{font-size:18px;line-height:1.75;color:rgba(30,20,10,.48);font-weight:300;max-width:520px;margin-bottom:26px;opacity:0;transition:opacity .55s .22s;min-height:28px}
#su.in{opacity:1}
#slot{opacity:0;transform:translateY(10px);transition:opacity .5s .28s,transform .5s .28s;margin-bottom:28px}
#slot.in{opacity:1;transform:translateY(0)}

/* data pills */
.dprow{display:flex;gap:3px}
.dp{padding:14px 22px;background:rgba(255,255,255,.85);border:1px solid rgba(200,160,100,.2);border-top:2px solid rgba(255,107,0,.4);min-width:110px;transition:all .3s;cursor:default;backdrop-filter:blur(10px)}
.dp:hover{background:#fff;border-top-color:#FF6B00;box-shadow:0 4px 20px rgba(255,107,0,.1)}
.dn{font-family:'Bebas Neue',sans-serif;font-size:54px;color:#FF6B00;line-height:1}
.dl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(30,20,10,.4);margin-top:4px}

/* theme grid */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:2px;max-width:520px}
.ti2{padding:14px 18px;background:rgba(255,255,255,.7);border-left:2px solid rgba(255,107,0,.3);transition:all .3s;cursor:default}
.ti2:hover{background:#fff;border-left-color:#FF6B00;padding-left:22px;box-shadow:0 2px 12px rgba(255,107,0,.08)}
.tn2{font-size:11px;letter-spacing:3px;color:#FF6B00;opacity:.75;margin-bottom:4px}
.tt2{font-size:16px;font-weight:500;color:rgba(20,10,5,.72)}

/* phase list */
.plist{display:flex;flex-direction:column;gap:2px;max-width:500px}
.pi{display:flex;align-items:center;gap:14px;padding:12px 16px;background:rgba(255,255,255,.65);border-left:2px solid rgba(255,107,0,.22);transition:all .3s;cursor:default}
.pi:hover{background:#fff;border-left-color:#FF6B00;padding-left:20px;box-shadow:0 2px 10px rgba(255,107,0,.08)}
.pn{font-size:10px;letter-spacing:2px;color:rgba(255,107,0,.65);width:22px;flex-shrink:0}
.pt{font-size:16px;color:rgba(20,10,5,.68);font-weight:400}

/* result list */
.rlist{display:flex;flex-direction:column;gap:2px;max-width:500px}
.ri{padding:14px 18px;background:rgba(255,255,255,.65);border-left:2px solid rgba(255,107,0,.22);transition:all .3s;cursor:default}
.ri:hover{background:#fff;border-left-color:#FF6B00;box-shadow:0 2px 10px rgba(255,107,0,.08)}
.rt{font-size:16px;font-weight:600;color:rgba(20,10,5,.78);margin-bottom:3px}
.rd{font-size:13px;color:rgba(20,10,5,.38);line-height:1.6}

/* impacto */
.impacto-item{display:flex;align-items:flex-start;gap:10px;font-size:17px;color:rgba(20,10,5,.62);line-height:1.55;margin-bottom:14px}
.impacto-item::before{content:'—';color:#FF6B00;flex-shrink:0;margin-top:1px}

/* budget */
.bwrap{max-width:420px}
.btot{font-family:'Bebas Neue',sans-serif;font-size:60px;color:#111;letter-spacing:1px;margin-bottom:3px}
.bsub{font-size:10px;letter-spacing:2px;color:rgba(255,107,0,.55);text-transform:uppercase;margin-bottom:22px}
.brow{display:flex;align-items:center;gap:12px;margin-bottom:9px}
.bn{font-size:14px;color:rgba(20,10,5,.42);width:130px;flex-shrink:0}
.bt{flex:1;height:2px;background:rgba(200,160,100,.18);overflow:hidden}
.bf{height:100%;background:linear-gradient(90deg,#FF4400,#FFAA00);width:0;transition:width 1.5s cubic-bezier(.4,0,.2,1)}
.bv{font-size:14px;color:#FF6B00;width:40px;text-align:right;flex-shrink:0;font-weight:600}

/* metas */
.mrow{display:flex;gap:4px}
.mc{padding:20px 26px;background:rgba(255,255,255,.8);border:1px solid rgba(200,160,100,.18);border-top:2px solid rgba(255,107,0,.38);text-align:center;min-width:120px;transition:all .3s;cursor:default}
.mc:hover{background:#fff;border-top-color:#FF6B00;transform:translateY(-3px);box-shadow:0 6px 20px rgba(255,107,0,.12)}
.mn{font-family:'Bebas Neue',sans-serif;font-size:64px;color:#FF6B00;line-height:1}
.ml{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(20,10,5,.38);margin-top:5px;line-height:1.4}

/* chart bars */
.cbar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.cbar-lbl{font-size:13px;color:rgba(20,10,5,.45);width:90px;flex-shrink:0;text-align:right}
.cbar-track{flex:1;height:4px;background:rgba(200,160,100,.15);overflow:hidden;border-radius:2px}
.cbar-fill{height:100%;border-radius:2px}
.cbar-val{font-size:13px;color:rgba(20,10,5,.55);width:36px;text-align:left;flex-shrink:0}

/* CTA */
.cta{display:inline-flex;align-items:center;gap:9px;padding:13px 28px;background:rgba(255,107,0,.07);border:1px solid rgba(255,107,0,.32);color:rgba(150,80,10,.8);font-size:12px;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;pointer-events:all;transition:all .3s;font-family:'DM Sans',sans-serif}
.cta:hover{background:#FF6B00;border-color:#FF6B00;color:#fff;box-shadow:0 4px 20px rgba(255,107,0,.25)}
.ca{opacity:.4;transition:all .3s}.cta:hover .ca{opacity:1;transform:translateX(4px)}

/* NAV */
#bnav{position:absolute;bottom:28px;right:52px;display:flex;align-items:center;gap:9px}
.nd{width:6px;height:6px;border-radius:50%;background:rgba(180,120,60,.2);cursor:pointer;pointer-events:all;transition:all .3s}
.nd.on{background:#FF6B00;box-shadow:0 0 6px rgba(255,107,0,.4)}
.na{width:30px;height:30px;border-radius:50%;border:1px solid rgba(180,120,60,.2);background:rgba(255,255,255,.6);color:rgba(120,70,20,.45);cursor:pointer;font-size:11px;transition:all .22s;display:flex;align-items:center;justify-content:center;pointer-events:all}
.na:hover{border-color:rgba(255,107,0,.5);color:#FF6B00;background:#fff}
.na:disabled{opacity:.15;pointer-events:none}
#pg{position:absolute;bottom:0;left:0;right:0;height:1.5px;background:rgba(200,150,80,.12)}
#pf{height:100%;background:#FF6B00;transition:width .55s ease;opacity:.65}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="grain"></div>
<div id="vig"></div>
<div id="fade"></div>

<div id="ui">
  <!-- TOPBAR -->
  <div id="topbar">
    <div id="gl">
      <svg viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="48" fill="#FF6B00"/><path d="M68 50H52v10h8.5C58 65.5 54.4 68 50 68c-9.9 0-18-8.1-18-18s8.1-18 18-18c4.6 0 8.8 1.8 11.9 4.7l7.1-7.1C64.6 25.4 57.7 22 50 22c-15.5 0-28 12.5-28 28s12.5 28 28 28c15.5 0 28-12.5 28-28z" fill="white"/></svg>
      <span id="gw">galp</span>
    </div>
    <div id="nl">EduGalp · Moçambique · 2025</div>
  </div>

  <!-- PANEL -->
  <div id="panel">
    <div id="ey"></div>
    <div id="ti"></div>
    <div id="su"></div>
    <div id="slot"></div>
    <button class="cta" id="ctab"><span id="ctxt">Começar</span> <span class="ca">→</span></button>
  </div>

  <!-- NAV -->
  <div id="bnav">
    <button class="na" id="pb" onclick="go(-1)" disabled>←</button>
    <div id="dw"></div>
    <button class="na" id="nb" onclick="go(1)">→</button>
  </div>
  <div id="pg"><div id="pf"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
// ─────────────────────────────────────────────────────
// RENDERER
// ─────────────────────────────────────────────────────
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('cv'),antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0xF8F6F2,1);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=0.90;
renderer.physicallyCorrectLights=true;

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0xF8F6F2,18,78);
const camera=new THREE.PerspectiveCamera(44,innerWidth/innerHeight,.05,200);

// camera spring
const cam={pos:new THREE.Vector3(0,1,14),look:new THREE.Vector3(0,0,0),fov:44,dp:new THREE.Vector3(0,1,14),dl:new THREE.Vector3(0,0,0),df:44};
camera.position.copy(cam.pos);

// ─────────────────────────────────────────────────────
// LIGHTS — cinematic warm
// ─────────────────────────────────────────────────────
scene.add(new THREE.HemisphereLight(0xFFEDD4,0xFFD8B8,2.4));
const key=new THREE.DirectionalLight(0xFFFAF0,1.8);
key.position.set(7,13,7);key.castShadow=true;
key.shadow.mapSize.set(2048,2048);
key.shadow.camera.left=-18;key.shadow.camera.right=18;
key.shadow.camera.top=18;key.shadow.camera.bottom=-18;
key.shadow.bias=-.0004;key.shadow.normalBias=.02;key.shadow.radius=4;
scene.add(key);
const rim=new THREE.PointLight(0xFF6622,1.4,40);rim.position.set(-9,4,-7);scene.add(rim);
const fill=new THREE.PointLight(0xFFBB77,1.0,32);fill.position.set(7,-3,9);scene.add(fill);
const bounce=new THREE.PointLight(0xFF8833,.6,18);bounce.position.set(0,-5,2);scene.add(bounce);

// ─────────────────────────────────────────────────────
// GROUND
// ─────────────────────────────────────────────────────
const gnd=new THREE.Mesh(new THREE.PlaneGeometry(100,100),new THREE.MeshStandardMaterial({color:0xEFEAE0,roughness:.92,metalness:.02}));
gnd.rotation.x=-Math.PI/2;gnd.position.y=-6;gnd.receiveShadow=true;scene.add(gnd);
const grid=new THREE.GridHelper(80,50,0xFF9944,0xDDD0BC);
grid.position.y=-5.98;grid.material.opacity=.1;grid.material.transparent=true;scene.add(grid);

// ─────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────
const lerp=(a,b,t)=>a+(b-a)*t;
const lv=(v,d,t)=>{v.x=lerp(v.x,d.x,t);v.y=lerp(v.y,d.y,t);v.z=lerp(v.z,d.z,t)};
const rnd=(a,b)=>a+(b-a)*Math.random();
function pbr(col,rough,metal,emit,emitI=0){
  const m=new THREE.MeshStandardMaterial({color:col,roughness:rough,metalness:metal});
  if(emit){m.emissive=new THREE.Color(emit);m.emissiveIntensity=emitI;}return m;
}
const mk=(g,m)=>{const o=new THREE.Mesh(g,m);o.castShadow=true;o.receiveShadow=true;return o;};

// ─────────────────────────────────────────────────────
// EARTH GLOBE
// ─────────────────────────────────────────────────────
const globeG=new THREE.Group();scene.add(globeG);globeG.position.set(3.8,0,0);
globeG.add(mk(new THREE.SphereGeometry(3,72,72),pbr(0x0a2840,.08,.25)));
function land(lat,lon,sz,col=0x1e4a1e){
  const phi=(90-lat)*Math.PI/180,theta=(lon+180)*Math.PI/180,R=3.02;
  const m=mk(new THREE.SphereGeometry(sz,10,10),pbr(col,.9,0));
  m.position.set(-R*Math.sin(phi)*Math.cos(theta),R*Math.cos(phi),R*Math.sin(phi)*Math.sin(theta));
  globeG.add(m);
}
[[7,20,.95],[0,28,.8],[-12,25,.85],[-25,28,.8],[15,35,.65],[2,38,.55],[-5,15,.7],[20,15,.7],[-32,26,.6]].forEach(([a,b,s])=>land(a,b,s));
[[48,8,.55],[52,18,.5],[40,2,.45]].forEach(([a,b,s])=>land(a,b,s,0x224a22));
[[35,85,.85],[45,105,.9],[25,105,.75]].forEach(([a,b,s])=>land(a,b,s,0x1e421e));
[[40,-100,.9],[20,-90,.75],[-10,-55,.85],[55,-105,.85]].forEach(([a,b,s])=>land(a,b,s,0x1e4820));
const phi0=(90+18)*Math.PI/180,th0=(35+180)*Math.PI/180,R0=3.03;
const mzM=pbr(0xFF6B00,.35,.1,0xFF4400,.65);
const mzD=mk(new THREE.SphereGeometry(.2,14,14),mzM);
mzD.position.set(-R0*Math.sin(phi0)*Math.cos(th0),R0*Math.cos(phi0),R0*Math.sin(phi0)*Math.sin(th0));
globeG.add(mzD);
globeG.add(mk(new THREE.SphereGeometry(3.15,36,36),new THREE.MeshStandardMaterial({color:0x1a3a55,transparent:true,opacity:.08,side:THREE.BackSide})));
const eqR=mk(new THREE.TorusGeometry(3.18,.03,8,90),pbr(0xFF6B00,.1,.3,0xFF5500,.75));
eqR.rotation.x=Math.PI/2;globeG.add(eqR);
const latR=mk(new THREE.TorusGeometry(3.4,.015,6,80),pbr(0x888888,.3,.85));
latR.rotation.x=Math.PI/3;globeG.add(latR);

// ─────────────────────────────────────────────────────
// HYPER-REALISTIC GAS CYLINDER (Galp LPG bottle)
// ─────────────────────────────────────────────────────
const cylG=new THREE.Group();scene.add(cylG);cylG.visible=false;

// Body — white cream enamel
const bodyMat=new THREE.MeshStandardMaterial({color:0xF0EDE8,roughness:.18,metalness:.05,envMapIntensity:1});
// Main cylinder body
const body=mk(new THREE.CylinderGeometry(1.05,1.05,4.2,64),bodyMat);
cylG.add(body);
// Bottom dome
const bDome=mk(new THREE.SphereGeometry(1.05,32,32,0,Math.PI*2,0,Math.PI/2),bodyMat);
bDome.rotation.x=Math.PI;bDome.position.y=-2.1;cylG.add(bDome);
// Top dome
const tDome=mk(new THREE.SphereGeometry(1.05,32,32,0,Math.PI*2,0,Math.PI/2),bodyMat);
tDome.position.y=2.1;cylG.add(tDome);

// Collar / shoulder ring — brushed steel
const collarMat=pbr(0x999999,.2,.92);
const collar=mk(new THREE.CylinderGeometry(.88,.88,.32,48),collarMat);
collar.position.y=2.42;cylG.add(collar);

// Valve head — brushed steel
const valveMat=pbr(0xAAAAAA,.15,.95);
const valveBase=mk(new THREE.CylinderGeometry(.35,.42,.28,32),valveMat);
valveBase.position.y=2.9;cylG.add(valveBase);
const valveStem=mk(new THREE.CylinderGeometry(.18,.22,.38,24),valveMat);
valveStem.position.y=3.22;cylG.add(valveStem);
const valveCap=mk(new THREE.SphereGeometry(.2,20,20),pbr(0x888888,.12,.95));
valveCap.position.y=3.42;cylG.add(valveCap);
// Valve handle — orange metal
const handleMat=pbr(0xFF5500,.2,.7,0xFF4400,.06);
for(let i=0;i<2;i++){
  const h=mk(new THREE.BoxGeometry(.08,.4,.55),handleMat);
  h.position.set(i===0?-.22:.22,3.18,0);cylG.add(h);
}
const hCross=mk(new THREE.BoxGeometry(.6,.08,.08),handleMat);
hCross.position.y=3.36;cylG.add(hCross);

// Bottom foot ring — steel
const footMat=pbr(0x777777,.3,.85);
const foot=mk(new THREE.CylinderGeometry(1.08,.95,.22,48),footMat);
foot.position.y=-2.5;cylG.add(foot);
const footRing=mk(new THREE.TorusGeometry(1.08,.06,12,48),footMat);
footRing.rotation.x=Math.PI/2;footRing.position.y=-2.6;cylG.add(footRing);

// Orange band / label area — Galp orange
const bandMat=new THREE.MeshStandardMaterial({color:0xFF6B00,roughness:.35,metalness:.05});
const band=mk(new THREE.CylinderGeometry(1.065,1.065,1.1,64),bandMat);
band.position.y=.3;cylG.add(band);

// Top orange accent ring
const topBand=mk(new THREE.CylinderGeometry(1.065,1.065,.18,64),bandMat);
topBand.position.y=1.9;cylG.add(topBand);

// Specular highlight strip
const specMat=new THREE.MeshStandardMaterial({color:0xFFFFFF,roughness:.02,metalness:.3,transparent:true,opacity:.18,emissive:new THREE.Color(0xFFFFFF),emissiveIntensity:.08});
const spec=mk(new THREE.CylinderGeometry(.72,.72,3.2,8),specMat);
spec.position.set(-.62,0,0);cylG.add(spec);

// Shadow catcher disc under cylinder
const shadow=mk(new THREE.CylinderGeometry(1.4,1.4,.02,48),new THREE.MeshStandardMaterial({color:0x0a0a18,roughness:1,metalness:0,transparent:true,opacity:.55}));
shadow.position.y=-2.75;cylG.add(shadow);

cylG.position.set(3.8,0,0);

// ─────────────────────────────────────────────────────
// SOLAR PANEL
// ─────────────────────────────────────────────────────
const solarG=new THREE.Group();scene.add(solarG);solarG.visible=false;
const frameMat=pbr(0x888899,.25,.88);
solarG.add(mk(new THREE.BoxGeometry(4.2,2.6,.1),frameMat));
const glassMat=new THREE.MeshStandardMaterial({color:0x1a2a44,roughness:.03,metalness:.05,transparent:true,opacity:.82,emissive:new THREE.Color(0x0a1828),emissiveIntensity:.08});
const pg=mk(new THREE.BoxGeometry(3.9,2.3,.06),glassMat);pg.position.z=.04;solarG.add(pg);
for(let r=0;r<3;r++)for(let c=0;c<5;c++){
  const cm=mk(new THREE.BoxGeometry(.7,.68,.04),pbr(0x0d1e35,.05,.1,0x1a3a55,.1));
  cm.position.set(-1.4+c*.76,-.7+r*.72,.07);solarG.add(cm);
  const ref=mk(new THREE.BoxGeometry(.55,.03,.02),pbr(0x6699bb,.02,.9,0x4488aa,.35));
  ref.position.set(-1.4+c*.76,-.4+r*.72,.09);solarG.add(ref);
}
mk(new THREE.CylinderGeometry(.05,.07,2.8,12),pbr(0x666677,.4,.85)).position.set(0,-2.4,0);solarG.add(solarG.children[solarG.children.length-1]);
mk(new THREE.CylinderGeometry(.55,.65,.18,24),pbr(0x555566,.5,.8)).position.set(0,-3.85,0);solarG.add(solarG.children[solarG.children.length-1]);
solarG.position.set(3.8,.5,0);solarG.rotation.x=-.15;

// ─────────────────────────────────────────────────────
// WIND TURBINE
// ─────────────────────────────────────────────────────
const turbG=new THREE.Group();scene.add(turbG);turbG.visible=false;
turbG.add(mk(new THREE.CylinderGeometry(.09,.18,5.5,16),pbr(0xCCCCCC,.35,.7)));
const nac=mk(new THREE.BoxGeometry(.65,.38,.45),pbr(0xDDDDDD,.3,.7));nac.position.y=2.65;turbG.add(nac);
const hub=mk(new THREE.SphereGeometry(.16,14,14),pbr(0xBBBBBB,.2,.8));hub.position.set(0,2.65,.24);turbG.add(hub);
const bladesG=new THREE.Group();bladesG.position.set(0,2.65,.24);turbG.add(bladesG);turbG.userData.blades=bladesG;
for(let i=0;i<3;i++){
  const bl=new THREE.Group();
  const bg=new THREE.BoxGeometry(.1,1.9,.05);bg.translate(0,.95,0);
  bl.add(mk(bg,pbr(0xEEEEEE,.28,.4)));
  const tip=mk(new THREE.BoxGeometry(.06,.2,.05),pbr(0xFF6B00,.2,.3,0xFF5500,.2));tip.position.y=1.95;bl.add(tip);
  bl.rotation.z=i*Math.PI*2/3;bladesG.add(bl);
}

const allObjs={globe:globeG,solar:solarG,turbine:turbG,water:waterG,ico:icoG,chart:chartG,cylinder:cylG};

// ─────────────────────────────────────────────────────
// NAV / SLIDE MANAGEMENT
// ─────────────────────────────────────────────────────
let cur=0,TOTAL=SLIDES.length,busy=false,flyUsed=false;
const cntTs=[];
const dw=document.getElementById('dw');
for(let i=0;i<TOTAL;i++){
  const d=document.createElement('div');d.className='nd'+(i===0?' on':'');
  d.onclick=()=>go(i-cur);dw.appendChild(d);
}

function stopCnt(){cntTs.forEach(clearInterval);cntTs.length=0;}

function showSlide(n){
  const s=SLIDES[n];
  const ey=document.getElementById('ey'),ti=document.getElementById('ti'),su=document.getElementById('su'),slot=document.getElementById('slot');
  [ey,ti,su,slot].forEach(e=>{e.classList.remove('in');});
  ey.textContent=s.ey;
  ti.innerHTML=s.ti.replace('\n','<br>');
  su.textContent=s.su;
  slot.innerHTML=s.html||'';
  stopCnt();document.querySelectorAll('.bf').forEach(b=>b.style.width='0%');
  document.querySelectorAll('.cbar-fill').forEach(b=>b.style.width='0%');
  setTimeout(()=>{
    [ey,ti,su,slot].forEach(e=>e.classList.add('in'));
    document.querySelectorAll('[data-target]').forEach(el=>{
      const tgt=+el.getAttribute('data-target');let v=0;const inc=tgt/52;
      const t=setInterval(()=>{v=Math.min(v+inc,tgt);el.textContent=Math.round(v);if(v>=tgt)clearInterval(t);},1100/52);
      cntTs.push(t);
    });
    if(s.html&&s.html.includes('bf')){
      setTimeout(()=>document.querySelectorAll('.bf').forEach(b=>b.style.width=b.dataset.w+'%'),350);
    }
    if(s.html&&s.html.includes('cbar-fill')){
      setTimeout(()=>document.querySelectorAll('.cbar-fill').forEach(b=>b.style.width=b.dataset.w+'%'),350);
    }
  },80);
  Object.keys(allObjs).forEach(k=>allObjs[k].visible=!!s.obj[k]);
  cam.dp.set(...s.cam.p);cam.dl.set(...s.cam.l);cam.df=s.cam.f;
  document.getElementById('pf').style.width=((n+1)/TOTAL*100)+'%';
  document.querySelectorAll('.nd').forEach((d,i)=>d.classList.toggle('on',i===n));
  document.getElementById('pb').disabled=n===0;document.getElementById('nb').disabled=n===TOTAL-1;
  document.getElementById('ctxt').textContent=s.cta;
  document.getElementById('ctab').onclick=()=>go(n===TOTAL-1?-(TOTAL-1):1);
}

function go(delta){
  const next=cur+delta;
  if(next<0||next>=TOTAL||busy)return;
  busy=true;
  const fade=document.getElementById('fade');
  const fromCover=cur===0&&next===1&&!flyUsed;
  if(fromCover){
    flyUsed=true;
    cam.dp.set(2.8,.2,7.5);cam.dl.set(3.8,0,0);cam.df=26;
    setTimeout(()=>{
      fade.style.transition='opacity .5s ease';fade.style.opacity='.96';
      setTimeout(()=>{cur=next;showSlide(cur);fade.style.transition='opacity .72s ease';fade.style.opacity='0';setTimeout(()=>busy=false,750);},520);
    },1250);
  } else {
    fade.style.transition='opacity .45s ease';fade.style.opacity='.92';
    setTimeout(()=>{cur=next;showSlide(cur);fade.style.transition='opacity .56s ease';fade.style.opacity='0';setTimeout(()=>busy=false,580);},460);
  }
}

document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')go(1);if(e.key==='ArrowLeft')go(-1);});
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{const dx=tx-e.changedTouches[0].clientX;if(Math.abs(dx)>60)go(dx>0?1:-1);});

// ─────────────────────────────────────────────────────
// RENDER LOOP
// ─────────────────────────────────────────────────────
const clock=new THREE.Clock();let gt=0;
function render(){
  requestAnimationFrame(render);
  const dt=Math.min(clock.getDelta(),.05);gt+=dt;
  lv(cam.pos,cam.dp,.026);lv(cam.look,cam.dl,.026);
  cam.fov=lerp(cam.fov,cam.df,.026);
  camera.position.copy(cam.pos);camera.fov=cam.fov;
  camera.updateProjectionMatrix();camera.lookAt(cam.look);

  // Globe
  if(globeG.visible){globeG.rotation.y+=.0012;eqR.rotation.z+=.003;latR.rotation.y+=.004;mzD.material.emissiveIntensity=.3+Math.sin(gt*2.8)*.15;}
  // Solar
  if(solarG.visible){solarG.rotation.y=Math.sin(gt*.2)*.05;glassMat.emissiveIntensity=.06+Math.sin(gt*1.5)*.015;}
  // Turbine
  if(turbG.visible&&turbG.userData.blades){turbG.userData.blades.rotation.z+=.018;turbG.rotation.y=Math.sin(gt*.14)*.035;}
  // Cylinder — slow rotation, light reflections
  if(cylG.visible){cylG.rotation.y+=.005;cylG.position.y=Math.sin(gt*.4)*.08;}
  // Ico
  if(icoG.visible){icoG.rotation.y+=.005;icoG.rotation.x+=.002;icoRing.rotation.z+=.007;icoG.position.y=Math.sin(gt*.38)*.1;}
  // Water
  if(waterG.visible){
    const wp=waterG.userData.wm.geometry.attributes.position;
    for(let i=0;i<wp.count;i++){const x=wp.getX(i),z=wp.getZ(i);wp.setY(i,Math.sin(x*.8+gt*1.2)*.07+Math.cos(z*.9+gt*.8)*.045);}
    wp.needsUpdate=true;
    waterG.children.forEach(c=>{if(c.userData.pi!==undefined){c.material.opacity=.04+Math.sin(gt*1.5+c.userData.pi*.8)*.03;c.scale.setScalar(1+Math.sin(gt*.8+c.userData.pi)*.06);}});
  }
  // Chart
  if(chartG.visible){chartG.children.forEach((c,i)=>{if(i<6&&c.scale)c.scale.y=1+Math.sin(gt*.5+i*.6)*.012;});}
  // Particles
  const fp=pGeo.attributes.position.array;
  for(let i=0;i<pN;i++){fp[i*3]+=pVel[i].x;fp[i*3+1]+=pVel[i].y;fp[i*3+2]+=pVel[i].z;if(fp[i*3+1]>6){fp[i*3+1]=-5;fp[i*3]=rnd(-14,14);}if(Math.abs(fp[i*3])>15)pVel[i].x*=-1;}
  pGeo.attributes.position.needsUpdate=true;
  // Lights
  rim.intensity=1.2+Math.sin(gt*.55)*.25;rim.position.x=-9+Math.sin(gt*.18)*2;
  fill.intensity=.85+Math.sin(gt*.42)*.18;bounce.intensity=.5+Math.sin(gt*.85)*.1;
  grid.position.z=(gt*.12)%1.5;
  renderer.render(scene,camera);
}

// INIT
cam.dp.set(...SLIDES[0].cam.p);cam.dl.set(...SLIDES[0].cam.l);cam.df=SLIDES[0].cam.f;
cam.pos.copy(cam.dp);cam.look.copy(cam.dl);cam.fov=cam.df;
showSlide(0);render();

window.addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();});
</script>
